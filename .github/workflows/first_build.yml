name: Create Tag and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build1:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build 1 output
        run: |
          mkdir build1
          echo "Hello from build1" > build1/file1.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build1-artifact
          path: build1/

  build2:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build 2 output
        run: |
          mkdir build2
          echo "Hello from build2" > build2/file2.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build2-artifact
          path: build2/

  release:
    runs-on: ubuntu-latest
    needs: [build1, build2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: |
          TAG=v1.$(date +'%Y%m%d%H%M%S')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Show files (debug)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: |
            build1-artifact/file1.txt
            build2-artifact/file2.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
